version: '3.9'

services:
    app:
        build:
            context: .
            dockerfile: Dockerfile
            args:
                NODEJS_VERSION: ${NODEJS_VERSION}
        volumes:
            - ../:/home/node/app
            #- /home/node/app/node_modules
        ports:
            - ${HOST_PORT}:3000
        environment:
            - CHOKIDAR_USEPOLLING=true
