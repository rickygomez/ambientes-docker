version: '3.7'

services:
    minio:
        image: 'minio/minio:latest'
        container_name: minio
        ports:
            - "9000:9000"
            - "8900:8900"
        environment:
            MINIO_ROOT_USER: 'minioadmin'
            MINIO_ROOT_PASSWORD: 'minioadmin'
            MINIO_BROWSER_REDIRECT_URL: 'http://localhost:8900'
            MINIO_SERVER_URL: 'http://localhost:9000'
        volumes:
            - minio_data:/data/minio
        command: minio server /data/minio --console-address ":8900"
        healthcheck:
            test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
            retries: 3
            start_period: 5s
    # createBucket:
    #     image: 'minio/mc:latest'
    #     container_name: CreateBucket
    #     depends_on:
    #         minio:
    #             condition: service_healthy
    #     environment:
    #         AWS_ACCESS_KEY_ID: 'minioadmin'
    #         AWS_SECRET_ACCESS_KEY: 'minioadmin'
    #         AWS_BUCKET_NAME: 'bucket-teste'
    #     entrypoint: >
    #         /bin/sh -c " /usr/bin/mc configs host add myminio http://minio:8900 minioadmin minioadmin; /usr/bin/mc mb myminio/bucket-teste; /usr/bin/mc policy set download myminio/bucket-teste; /usr/bin/mc policy set public myminio/bucket-teste; /usr/bin/mc anonymous set upload myminio/bucket-teste; /usr/bin/mc anonymous set download myminio/bucket-teste; /usr/bin/mc anonymous set public myminio/bucket-teste; exit 0"

volumes:
    minio_data:
        driver: local
        driver_opts:
            type: none
            device: ../../volumes/minio_data
            o: bind
